<div class="main-container">
    <mat-toolbar color="primary">
        <div style="width: 100%">
            <span><a class="titlelink" [routerLink]="['/']">{{ title }}</a></span>
            <span class="nav">
                <a mat-button [routerLink]="['/family']" hint="Family">Family</a>
                <a mat-button [routerLink]="['/work']" hint="Work">Work</a>
                <a mat-button [routerLink]="['/ideas']" hint="Ideas">Ideas</a>
                <a mat-button href="http://erikvann.com" target="_new">Music</a>
                <a mat-button [routerLink]="['/pages/books']" hint="Books">What I'm Reading</a>
            </span>
            <span class="nav-spacer"></span>
        </div>
    </mat-toolbar>

    <div class="outer">
        <div fxLayout="row" fxLayoutGap="25px" fxLayoutAlign="space-between start"  fxLayout.xs="column" fxFlexFill>
            <div fxFlex="20" class="fullwidth">
                <app-about-me [profile]="profile"></app-about-me>
            </div>
        
            <div fxFlex="80" class="fullwidth">
                <router-outlet></router-outlet>
            </div>
        </div>
    </div>
</div>
