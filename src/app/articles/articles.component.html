
<div class="row" fxLayout="row" fxLayout.xs="column" fxFlexFill>
    <div fxFlex="25" class="sec1" fxFlex.xs="55">
        <app-about-me></app-about-me>
    </div>

    <div fxFlex="150" class="sec1" fxFlex.xs="55">
      <div *ngIf="hasArticles()">
        <span *ngFor="let article of articles">
            <articles-listitem style="padding: 10px;" [article]="article"></articles-listitem>
        </span>
      </div>
    </div>
</div>
