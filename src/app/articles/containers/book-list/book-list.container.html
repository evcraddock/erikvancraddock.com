<div fxLayout="row" fxLayoutGap="25px" fxLayoutAlign="space-between start"  fxLayout.xs="column" fxFlexFill>
    <div fxFlex="80" class="fullwidth">
        <mat-card class="article-card">
            <span class="article-header">
                <h1 class="article-title">What I'm Reading</h1>
            </span>
            <mat-card-content>
                <p class="article-entry">
                    I love to read. I read so much that sometimes I worry about how healthy it might be. When I am in need of a good book I ask my friends. So it is only fair that I also recommend the books that I enjoy.
                </p>

                <app-pin-list url="https://www.pinterest.com/evcraddock/currently-reading/" description="Currently Reading"></app-pin-list>

                <app-pin-list url="https://www.pinterest.com/evcraddock/recently-read-books/" description="Most Recent Books I've Read"></app-pin-list>

                <app-pin-list url="https://www.pinterest.com/evcraddock/books-worth-reading/" description="My Favorite Books"></app-pin-list>
                
            </mat-card-content>
        </mat-card>
    </div>

    <div fxFlex="20" class="fullwidth">

    </div>
</div>
