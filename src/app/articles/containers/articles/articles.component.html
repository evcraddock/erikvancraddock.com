<div fxLayout="row" fxLayoutGap="30px" fxLayoutAlign="space-between start"  fxLayout.xs="column" fxFlexFill>
    <div fxFlex="none" style="width:300px">
        <app-about-me></app-about-me>
    </div>

    <div fxFlex="none" style="width: 800px">
        <h2 class="capitalize">{{title}}</h2>
        <div *ngIf="articles.length > pagesize">
            <mat-paginator
                [length]="articles.length"
                [pageSize]="pagesize"
                (page)="pageEvent = changePage($event)">
            </mat-paginator>
        </div>
        <div *ngIf="hasArticles()">
            
            <span *ngFor="let article of pagedArticles">
                <articles-listitem [article]="article"></articles-listitem>
            </span>
        </div>

        <div *ngIf="!hasArticles()">
            No {{title}} articles were found!
        </div>
    </div>

    <div fxFlex="none" style="width:300px">
            
    </div>

    <div fxFlex="50">
            
    </div>
</div>
