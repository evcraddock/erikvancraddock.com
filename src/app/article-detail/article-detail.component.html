<div fxLayout="row" fxLayoutGap="30px" fxLayoutAlign="space-between start"  fxLayout.xs="column" fxFlexFill>
  <div fxFlex="none" style="width:300px">
    <app-about-me ></app-about-me>
  </div>

  <div fxFlex="none" style="width: 1000px">
      <mat-card  >
          <img mat-card-image *ngIf="article.banner" [src]="getBannerImage()" alt="">
          <h2>
              {{article.title}}
          </h2>
          <mat-card-header>
            
            <mat-card-title>
                by {{article.author}}
            </mat-card-title>
            <mat-card-subtitle>
                Posted on {{article.publishDate | date: 'shortDate'}}
            </mat-card-subtitle>
          </mat-card-header>
          
          <mat-card-content>
            <p [innerHtml]="article.content | MarkdownToHtml"></p>
          </mat-card-content>
      </mat-card>
  </div>

  <div fxFlex="50" >
      
    </div>
</div>
